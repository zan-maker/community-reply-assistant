services:
  community-reply:
    build: .
    container_name: community-reply-assistant
    restart: unless-stopped
    depends_on:
      vectorai-db:
        condition: service_healthy
      vectorai-bridge:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - app-data:/app/data
      - app-env:/app/.env.local
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/community-reply.db
      - VECTORAI_BRIDGE_URL=http://vectorai-bridge:27832
      - EMBEDDING_SERVER_URL=http://vectorai-bridge:27832
      - VECTORAI_COLLECTION=reddit_threads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Actian VectorAI DB — Semantic vector search engine (gRPC)
  # Docker Hub: williamimoh/actian-vectorai-db:latest
  # gRPC port: 50051
  # Data persisted in /data volume
  vectorai-db:
    image: williamimoh/actian-vectorai-db:latest
    container_name: vectorai-db
    restart: unless-stopped
    volumes:
      - vector-data:/data
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"from actian_vectorai import VectorAIClient; c = VectorAIClient('localhost:50051'); print(c.health_check())\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # VectorAI Bridge — REST API wrapper over VectorAI DB + Embedding model
  # Exposes: /api/embed, /api/embed-batch, /api/collections/*, /api/health
  vectorai-bridge:
    build:
      context: .
      dockerfile: Dockerfile.vectorai
    container_name: vectorai-bridge
    restart: unless-stopped
    depends_on:
      vectorai-db:
        condition: service_healthy
    ports:
      - "27832:27832"
    environment:
      - VECTORAI_GRPC_HOST=vectorai-db:50051
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - BRIDGE_PORT=27832
      - VECTORAI_COLLECTION=reddit_threads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:27832/api/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  app-data:
    driver: local
  app-env:
    driver: local
  vector-data:
    driver: local
